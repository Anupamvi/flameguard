properties:
  configuration:
    secrets:
      - name: azure-api-key
        value: <replace-locally>
  template:
    containers:
      - name: flameguard-backend
        image: <registry>.azurecr.io/flameguard-backend:<tag>
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: LLM_PROVIDER
            value: azure
          - name: AZURE_ENDPOINT
            value: "https://<your-resource>.services.ai.azure.com"
          - name: AZURE_API_KEY
            secretRef: azure-api-key
          - name: LLM_MODEL
            value: gpt-5.4-nano
          - name: DB_PATH
            value: /tmp/flameguard.db
          - name: FLAMEGUARD_DB_PATH
            value: /tmp/flameguard.db
          - name: CORS_ORIGINS
            value: '["https://<your-frontend-hostname>"]'
    scale:
      minReplicas: 1
      maxReplicas: 3
