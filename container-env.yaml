properties:
  template:
    containers:
      - name: flameguard-backend
        image: flameguardacr.azurecr.io/flameguard-backend:v4
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: CORS_ORIGINS
            value: '["https://flameguard-frontend.ashyforest-99ee1f24.eastus.azurecontainerapps.io"]'
          - name: DB_PATH
            value: /tmp/flameguard.db
          - name: FLAMEGUARD_DB_PATH
            value: /tmp/flameguard.db
          - name: ANTHROPIC_API_KEY
            value: placeholder
